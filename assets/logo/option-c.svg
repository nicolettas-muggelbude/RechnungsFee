<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- RF Monogramm – vertikal zentriert -->
  <text x="256" y="310"
        font-size="240" font-weight="900" fill="white"
        font-family="'Arial Black', Arial, sans-serif"
        text-anchor="middle" letter-spacing="-10">RF</text>

  <!-- Funken -->
  <!-- Groß oben rechts -->
  <path d="M 382,78 L 391,100 L 414,78 L 391,100 L 382,122 L 373,100 L 350,78 L 373,100 Z"
        fill="#FBBF24"/>
  <circle cx="378" cy="74" r="5" fill="white" opacity="0.55"/>

  <!-- Mittel oben links -->
  <path d="M 130,108 L 137,124 L 154,108 L 137,124 L 130,140 L 123,124 L 106,108 L 123,124 Z"
        fill="#F59E0B" opacity="0.9"/>

  <!-- Klein rechts Mitte -->
  <path d="M 410,240 L 414,252 L 426,240 L 414,252 L 410,264 L 406,252 L 394,240 L 406,252 Z"
        fill="#FCD34D" opacity="0.8"/>

  <!-- Punkte -->
  <circle cx="400" cy="148" r="6"  fill="#FBBF24" opacity="0.6"/>
  <circle cx="118" cy="360" r="7"  fill="#F59E0B" opacity="0.5"/>
  <circle cx="136" cy="342" r="4"  fill="#FCD34D" opacity="0.45"/>
</svg>
