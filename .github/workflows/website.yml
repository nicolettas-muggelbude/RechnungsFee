name: Website Build & Deploy

on:
  push:
    branches: [web]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v6

      - name: Wiki klonen
        run: |
          git clone https://github.com/nicolettas-muggelbude/RechnungsFee.wiki.git wiki-src
          mkdir -p src/content/handbuch
          cp wiki-src/*.md src/content/handbuch/ 2>/dev/null || true
          rm -f src/content/handbuch/_Sidebar.md
          rm -f src/content/handbuch/_Footer.md

      - name: Changelog-Daten kopieren
        run: |
          mkdir -p src/data
          curl -sSfL "https://raw.githubusercontent.com/nicolettas-muggelbude/RechnungsFee/main/src/frontend/src/data/changelog.ts" -o src/data/changelog.ts

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Astro bauen
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Seiten-Artefakt erstellen
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "dist" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git --exclude=.github \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
