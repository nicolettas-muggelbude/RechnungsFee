name: Website Build & Deploy

on:
  push:
    branches: [web]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5

      - name: Wiki klonen
        run: |
          git clone https://github.com/nicolettas-muggelbude/RechnungsFee.wiki.git wiki-src
          mkdir -p web/src/content/handbuch
          cp wiki-src/*.md web/src/content/handbuch/ 2>/dev/null || true
          rm -f web/src/content/handbuch/_Sidebar.md
          rm -f web/src/content/handbuch/_Footer.md

      - name: Changelog-Daten kopieren
        run: |
          mkdir -p web/src/data
          cp src/frontend/src/data/changelog.ts web/src/data/changelog.ts

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci
        working-directory: web

      - name: Astro bauen
        run: npm run build
        working-directory: web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
