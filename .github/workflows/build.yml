name: Release-Build

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_ext: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_ext: '.exe'
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_ext: ''
          - platform: macos-13
            target: x86_64-apple-darwin
            sidecar_ext: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux-Systemabhängigkeiten ──────────────────────────────────────────
      - name: Linux-Deps installieren
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Python / PyInstaller ────────────────────────────────────────────────
      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python-Abhängigkeiten installieren
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Backend-Sidecar bauen (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: bash scripts/build-sidecar.sh

      - name: Backend-Sidecar bauen (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: pwsh scripts/build-sidecar.ps1

      - name: Backend-Sidecar bauen (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/build-sidecar.sh

      # ── Node.js / Frontend ──────────────────────────────────────────────────
      - name: Node.js 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Frontend-Abhängigkeiten installieren
        working-directory: src/frontend
        run: npm ci

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Rust-Toolchain einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── App-Version aus Git-Tag ─────────────────────────────────────────────
      - name: App-Version aus Git-Tag setzen
        run: python -c "import json; f='src-tauri/tauri.conf.json'; d=json.load(open(f)); d['version']='${{ github.ref_name }}'.lstrip('v'); open(f,'w').write(json.dumps(d, indent=2))"

      # ── Tauri-Build & Release ───────────────────────────────────────────────
      - name: Tauri CLI installieren
        run: npm install -g @tauri-apps/cli@^2

      - name: Tauri-App bauen und Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RechnungsFee ${{ github.ref_name }}'
          releaseBody: |
            Automatisch generiertes Release für ${{ github.ref_name }}.

            **Enthaltene Pakete:**
            - Linux: `.AppImage`
            - Windows: `.exe` (NSIS-Installer)

            Bitte lies die [Installationsanleitung](https://github.com/${{ github.repository }}/blob/main/README.md) vor der Installation.
          releaseDraft: true
          prerelease: false
          projectPath: .
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      # ── AppImage: gebündelte Bibliotheken entfernen ──────────────────────────────
      # Problem: linuxdeploy bündelt webkit2gtk + GStreamer aus Ubuntu 22.04.
      # Auf neueren Distros (Fedora, Bazzite) kollidieren diese mit den System-
      # Bibliotheken: System-webkit2gtk braucht gst_video_is_dma_drm_caps
      # (GStreamer 1.24+), findet aber die gebündelte ältere Version → Absturz.
      # Fix: usr/lib/ komplett entfernen → System-webkit2gtk + System-GStreamer
      # + System-Mesa werden genutzt (getestet, funktioniert).
      # install-linux.sh stellt sicher dass die nötigen Pakete installiert sind.
      - name: AppImage Bibliotheken entbündeln (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ github.ref_name }}"
          V="${V#v}"
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          APPIMAGE="$BASE/RechnungsFee_${V}_amd64.AppImage"
          SQUASH="${GITHUB_WORKSPACE}/squashfs-root"

          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          echo "=== usr/lib vor dem Entfernen ==="
          du -sh "$SQUASH/usr/lib/" 2>/dev/null || echo "(leer)"
          ls "$SQUASH/usr/lib/" 2>/dev/null | head -20 || true

          # Alle gebündelten Bibliotheken entfernen
          rm -rf "$SQUASH/usr/lib/"
          echo "=== usr/lib/ entfernt – System-Bibliotheken werden verwendet ==="

          wget -qO /tmp/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$SQUASH" "$APPIMAGE"
          echo "AppImage neu gepackt: $(du -sh "$APPIMAGE" | cut -f1)"

          gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber
          rm -rf "$SQUASH"

      # ── Version-loses AppImage + Desktop-Integrations-Skript hochladen ──────────
      - name: Version-loses AppImage + install-linux.sh hochladen (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ github.ref_name }}"
          V="${V#v}"
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          cp "$BASE/RechnungsFee_${V}_amd64.AppImage" "$BASE/RechnungsFee_amd64.AppImage"
          gh release upload "${{ github.ref_name }}" \
            "$BASE/RechnungsFee_amd64.AppImage" \
            "${GITHUB_WORKSPACE}/scripts/install-linux.sh" \
            --clobber

      # ── Updater-Artefakte hochladen ─────────────────────────────────────────
      - name: Updater-ZIP und Signatur hochladen (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $V = "${{ github.ref_name }}".TrimStart('v')
          $base = "${{ github.workspace }}\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis"
          $exe = "$base\RechnungsFee_${V}_x64-setup.exe"
          $zip = "$base\RechnungsFee_${V}_x64-setup.nsis.zip"
          $sig = "${zip}.sig"

          # .nsis.zip aus .exe erstellen (tauri build erstellt es nicht ohne Signing-Konfig)
          # Achtung: PowerShell Compress-Archive nutzt Deflate64 (nicht kompatibel mit tauri-plugin-updater)
          # → Python zipfile mit ZIP_DEFLATED (standard Deflate, method 8) verwenden
          if (-not (Test-Path $zip)) {
            $exeName = Split-Path -Leaf $exe
            python -c "import zipfile; zf = zipfile.ZipFile(r'$zip', 'w', zipfile.ZIP_STORED); zf.write(r'$exe', '$exeName'); zf.close()"
          }

          # Falls .sig bereits vorhanden (von tauri build), direkt hochladen
          if (-not (Test-Path $sig)) {
            # minisign 0.12 für Windows herunterladen
            Invoke-WebRequest -Uri "https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-win64.zip" -OutFile "$env:TEMP\minisign.zip"
            Expand-Archive -Path "$env:TEMP\minisign.zip" -DestinationPath "$env:TEMP\minisign-bin" -Force
            $minisign = "$env:TEMP\minisign-bin\minisign-win64\x86_64\minisign.exe"

            # Key-Format erkennen (base64-kodiert oder raw)
            $keyContent = $env:TAURI_SIGNING_PRIVATE_KEY
            $keyFile = [System.IO.Path]::GetTempFileName() + ".key"
            $stripped = $keyContent -replace '[\s]', ''
            try {
              $decoded = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($stripped))
              if ($decoded.StartsWith("untrusted comment:")) {
                Write-Host "Key-Format: base64-kodiert"
                [System.IO.File]::WriteAllText($keyFile, $decoded)
              } else { throw "Not a minisign key" }
            } catch {
              Write-Host "Key-Format: raw (oder escaped \n)"
              [System.IO.File]::WriteAllText($keyFile, ($keyContent -replace '\\n', "`n"))
            }

            # Signieren: -H = Prehash, -x = explizite Ausgabedatei
            $password = $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD
            $password | & $minisign -SHm "$zip" -s "$keyFile" -x "$sig"
            Remove-Item $keyFile -Force
          }

          gh release upload "${{ github.ref_name }}" "$zip" "$sig" --clobber

      - name: Updater-TAR und Signatur hochladen (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          V="${{ github.ref_name }}"
          V="${V#v}"
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          TAR="$BASE/RechnungsFee_${V}_amd64.AppImage.tar.gz"
          SIG="${TAR}.sig"

          echo "=== bundle/appimage Inhalt ==="
          ls -la "$BASE/"

          # Falls tauri build bereits .tar.gz + .sig erzeugt hat, direkt hochladen
          if [ -f "$SIG" ]; then
            echo "Signatur bereits vorhanden (von tauri build), direkt hochladen"
            gh release upload "${{ github.ref_name }}" "$TAR" "$SIG" --clobber
            exit 0
          fi

          # .tar.gz neu erstellen (tauri build löscht es möglicherweise)
          tar -czf "$TAR" -C "$BASE" "RechnungsFee_${V}_amd64.AppImage"

          # minisign installieren – nicht in Ubuntu 22.04 Repos, daher Binary von GitHub
          curl -sSL https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz \
            | tar -xz --strip-components=2 -C /usr/local/bin minisign-linux/x86_64/minisign
          chmod +x /usr/local/bin/minisign

          # Key in Temp-Datei schreiben; unterstützt base64-kodierten und raw-Format
          KEYFILE=$(mktemp)
          STRIPPED=$(echo "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '[:space:]')
          if echo "$STRIPPED" | base64 -d 2>/dev/null | grep -q "^untrusted comment:"; then
            echo "Key-Format: base64-kodiert"
            echo "$STRIPPED" | base64 -d > "$KEYFILE"
          else
            echo "Key-Format: raw (oder escaped \\n)"
            printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$KEYFILE"
          fi

          # Signieren: -H = Prehash-Modus (kompatibel mit tauri-plugin-updater, optimal für große Dateien)
          # -x "$SIG" = Ausgabedatei explizit angeben (Standard wäre .minisig)
          printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" | minisign -SHm "$TAR" -s "$KEYFILE" -x "$SIG"
          rm -f "$KEYFILE"

          gh release upload "${{ github.ref_name }}" "$TAR" "$SIG" --clobber

      # ── macOS: Versionlose DMG-Kopie hochladen ──────────────────────────────
      - name: Versionlose DMG-Kopie hochladen (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ github.ref_name }}"
          V="${V#v}"
          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == "aarch64-apple-darwin" ]]; then
            ARCH="aarch64"
          else
            ARCH="x64"
          fi
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/${TARGET}/release/bundle/dmg"
          echo "=== bundle/dmg Inhalt ==="
          ls -la "$BASE/" || echo "(leer)"
          cp "$BASE/RechnungsFee_${V}_${ARCH}.dmg" "$BASE/RechnungsFee_${ARCH}.dmg"
          gh release upload "${{ github.ref_name }}" "$BASE/RechnungsFee_${ARCH}.dmg" --clobber

      # ── macOS: Updater-TAR und Signatur hochladen ───────────────────────────
      - name: Updater-TAR und Signatur hochladen (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          V="${{ github.ref_name }}"
          V="${V#v}"
          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == "aarch64-apple-darwin" ]]; then
            ARCH="aarch64"
          else
            ARCH="x64"
          fi

          BUNDLE_BASE="${GITHUB_WORKSPACE}/src-tauri/target/${TARGET}/release/bundle"
          MACOS_DIR="$BUNDLE_BASE/macos"
          DMG_DIR="$BUNDLE_BASE/dmg"
          TAR="$MACOS_DIR/RechnungsFee_${V}_${ARCH}.app.tar.gz"
          SIG="${TAR}.sig"

          echo "=== bundle/macos Inhalt ===" && ls -la "$MACOS_DIR/" || echo "(leer)"
          echo "=== bundle/dmg Inhalt ===" && ls -la "$DMG_DIR/" || echo "(leer)"

          if [ -f "$SIG" ]; then
            echo "Signatur bereits vorhanden, direkt hochladen"
            gh release upload "${{ github.ref_name }}" "$TAR" "$SIG" --clobber
            exit 0
          fi

          # .app.tar.gz erstellen – .app aus DMG extrahieren wenn nötig
          if [ ! -f "$TAR" ]; then
            if [ ! -d "$MACOS_DIR/RechnungsFee.app" ]; then
              echo ".app nicht in macos/ – extrahiere aus DMG …"
              DMG=$(ls "$DMG_DIR"/RechnungsFee_*.dmg 2>/dev/null | head -1)
              MOUNTPOINT=$(mktemp -d)
              hdiutil attach "$DMG" -mountpoint "$MOUNTPOINT" -nobrowse -quiet
              cp -R "$MOUNTPOINT/RechnungsFee.app" "$MACOS_DIR/"
              hdiutil detach "$MOUNTPOINT" -quiet || true
            fi
            tar -czf "$TAR" -C "$MACOS_DIR" "RechnungsFee.app"
          fi

          brew install minisign

          KEYFILE=$(mktemp)
          STRIPPED=$(echo "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '[:space:]')
          if echo "$STRIPPED" | base64 -d 2>/dev/null | grep -q "^untrusted comment:"; then
            echo "$STRIPPED" | base64 -d > "$KEYFILE"
          else
            printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$KEYFILE"
          fi

          printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" | minisign -SHm "$TAR" -s "$KEYFILE" -x "$SIG"
          rm -f "$KEYFILE"

          gh release upload "${{ github.ref_name }}" "$TAR" "$SIG" --clobber

  # ── latest.json generieren + Release-Notes aktualisieren ──────────────────
  updater-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: latest.json generieren und hochladen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs --repo "$REPO"

          python3 << 'PYEOF'
          import json, os, re, datetime, base64

          v    = os.environ['TAG'].lstrip('v')
          tag  = os.environ['TAG']
          repo = os.environ['REPO']
          base = f'https://github.com/{repo}/releases/download/{tag}'

          def sig_b64(path):
              # tauri-plugin-updater erwartet den .sig-Datei-Inhalt base64-kodiert
              return base64.b64encode(open(path, 'rb').read()).decode('ascii')

          # ── latest.json ────────────────────────────────────────────────────
          platforms = {
            'windows-x86_64': {
              'signature': sig_b64(f'sigs/RechnungsFee_{v}_x64-setup.nsis.zip.sig'),
              'url': f'{base}/RechnungsFee_{v}_x64-setup.nsis.zip',
            },
            'linux-x86_64': {
              'signature': sig_b64(f'sigs/RechnungsFee_{v}_amd64.AppImage.tar.gz.sig'),
              'url': f'{base}/RechnungsFee_{v}_amd64.AppImage.tar.gz',
            },
          }
          # macOS – optional, nur wenn Signaturen vorhanden
          for arch, platform_key in [('aarch64', 'darwin-aarch64'), ('x64', 'darwin-x86_64')]:
            sig_path = f'sigs/RechnungsFee_{v}_{arch}.app.tar.gz.sig'
            if os.path.exists(sig_path):
              platforms[platform_key] = {
                'signature': sig_b64(sig_path),
                'url': f'{base}/RechnungsFee_{v}_{arch}.app.tar.gz',
              }
              print(f'{platform_key} zur latest.json hinzugefügt')
            else:
              print(f'{platform_key}: keine Signatur gefunden, übersprungen')

          data = {
            'version': v,
            'notes': '',
            'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'platforms': platforms,
          }
          json.dump(data, open('latest.json', 'w'), indent=2)
          print('latest.json generiert')

          # ── Release-Notes aus changelog.ts extrahieren ─────────────────────
          ts = open('src/frontend/src/data/changelog.ts').read()
          block = re.search(
            rf"version:\s*['\"]({re.escape(tag)})['\"].*?eintraege:\s*\[(.*?)\]",
            ts, re.DOTALL
          )
          typ_emoji = {'neu': '✨', 'verbesserung': '⚡', 'fix': '🐛'}
          changelog_lines = []
          if block:
            for typ, text in re.findall(r"typ:\s*['\"](\w+)['\"],\s*text:\s*'([^']+)'", block.group(2)):
              changelog_lines.append(f'- {typ_emoji.get(typ, "•")} {text}')
          changelog_md = '\n'.join(changelog_lines) if changelog_lines else '_Keine Einträge gefunden._'

          # ── Release-Body zusammenbauen ──────────────────────────────────────
          win_exe      = f'RechnungsFee_{v}_x64-setup.exe'
          lin_img      = 'RechnungsFee_amd64.AppImage'
          lin_img_ver  = f'RechnungsFee_{v}_amd64.AppImage'
          mac_arm      = 'RechnungsFee_aarch64.dmg'
          mac_x64      = 'RechnungsFee_x64.dmg'
          win_url      = f'{base}/{win_exe}'
          lin_url      = f'{base}/{lin_img}'
          lin_url_ver  = f'{base}/{lin_img_ver}'
          mac_arm_url  = f'{base}/{mac_arm}'
          mac_x64_url  = f'{base}/{mac_x64}'
          install_sh   = 'install-linux.sh'
          install_url  = f'{base}/{install_sh}'

          body = f"""## Was ist neu in {tag}

          {changelog_md}

          ---

          ## Download & Installation

          | Betriebssystem | Download | Hinweis |
          |---|---|---|
          | **Windows** | [⬇ {win_exe}]({win_url}) | NSIS-Installer, einfach ausführen |
          | **Linux** | [⬇ {lin_img}]({lin_url}) | **Empfohlen** – Dateiname bleibt nach Auto-Updates korrekt |
          | **Linux (versioniert)** | [⬇ {lin_img_ver}]({lin_url_ver}) | Alternative mit Versionsnummer im Dateinamen |
          | **Linux: Menü-Integration** | [⬇ {install_sh}]({install_url}) | Einmalig ausführen → Icon + Starter im Anwendungsmenü |
          | **macOS (Apple Silicon)** | [⬇ {mac_arm}]({mac_arm_url}) | M1/M2/M3/M4 – siehe Hinweis unten |
          | **macOS (Intel)** | [⬇ {mac_x64}]({mac_x64_url}) | Ältere Macs – siehe Hinweis unten |

          **Auto-Update:** Wer v0.1.3 oder neuer installiert hat, bekommt das Update automatisch beim nächsten App-Start angeboten.

          ### Linux: Starter ins Anwendungsmenü integrieren

          Damit RechnungsFee in GNOME Activities, KDE Launcher, XFCE-Menü usw. erscheint:

          ```bash
          # 1. AppImage herunterladen und ausführbar machen
          chmod +x RechnungsFee_amd64.AppImage

          # 2. Integrations-Skript ausführen (einmalig)
          wget -qO install-linux.sh {base}/install-linux.sh
          chmod +x install-linux.sh
          ./install-linux.sh ./RechnungsFee_amd64.AppImage
          ```

          ### macOS: Gatekeeper-Hinweis

          Da RechnungsFee kein kostenpflichtiges Apple-Entwicklerzertifikat besitzt, zeigt macOS beim ersten Start eine Warnung. So öffnest du die App trotzdem:

          **Methode 1 (einfach):** Rechtsklick auf `RechnungsFee.app` → „Öffnen" → im Dialog erneut „Öffnen" klicken.

          **Methode 2 (Terminal):**
          ```bash
          xattr -cr /Applications/RechnungsFee.app
          ```

          Danach startet die App normal und die Warnung erscheint nicht mehr.

          > ℹ️ Die Dateien `.tar.gz`, `.nsis.zip`, `.app.tar.gz` und `.sig` sind für den eingebauten Auto-Updater – **nicht manuell herunterladen**.

          ---

          ## Mitwirken

          Fehler gefunden oder Feature-Wunsch? → [Issue erstellen](https://github.com/{repo}/issues/new)
          """
          body = '\n'.join(line.lstrip() for line in body.splitlines())

          open('release_body.md', 'w').write(body)
          print('Release-Body generiert')
          PYEOF

          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
          gh release edit "$TAG" --notes-file release_body.md --repo "$REPO"
