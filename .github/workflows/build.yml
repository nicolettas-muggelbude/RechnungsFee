name: Release-Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sidecar_ext: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_ext: '.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux-Systemabhängigkeiten ──────────────────────────────────────────
      - name: Linux-Deps installieren
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Python / PyInstaller ────────────────────────────────────────────────
      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python-Abhängigkeiten installieren
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Backend-Sidecar bauen (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: bash scripts/build-sidecar.sh

      - name: Backend-Sidecar bauen (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: pwsh scripts/build-sidecar.ps1

      # ── Node.js / Frontend ──────────────────────────────────────────────────
      - name: Node.js 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Frontend-Abhängigkeiten installieren
        working-directory: src/frontend
        run: npm ci

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Rust-Toolchain einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── App-Version aus Git-Tag ─────────────────────────────────────────────
      - name: App-Version aus Git-Tag setzen
        run: python -c "import json; f='src-tauri/tauri.conf.json'; d=json.load(open(f)); d['version']='${{ github.ref_name }}'.lstrip('v'); open(f,'w').write(json.dumps(d, indent=2))"

      # ── Tauri-Build & Release ───────────────────────────────────────────────
      - name: Tauri CLI installieren
        run: npm install -g @tauri-apps/cli@^2

      - name: Tauri-App bauen und Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RechnungsFee ${{ github.ref_name }}'
          releaseBody: |
            Automatisch generiertes Release für ${{ github.ref_name }}.

            **Enthaltene Pakete:**
            - Linux: `.AppImage`
            - Windows: `.msi`

            Bitte lies die [Installationsanleitung](https://github.com/${{ github.repository }}/blob/main/README.md) vor der Installation.
          releaseDraft: true
          prerelease: false
          projectPath: .
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      # ── Updater-Artefakte hochladen ─────────────────────────────────────────
      - name: Updater-ZIP und Signatur hochladen (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $base = "${{ github.workspace }}\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi"
          Get-ChildItem -Path $base | Where-Object { $_.Name -match "\.msi\.zip(\.sig)?$" } | ForEach-Object {
            gh release upload "${{ github.ref_name }}" $_.FullName --clobber
          }

      - name: Updater-TAR und Signatur hochladen (Linux)
        if: matrix.platform == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          for f in "$BASE"/RechnungsFee_*.AppImage.tar.gz "$BASE"/RechnungsFee_*.AppImage.tar.gz.sig; do
            [ -f "$f" ] && gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

  # ── latest.json generieren (nach beiden Builds) ────────────────────────────
  updater-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: latest.json generieren und hochladen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs --repo "$REPO"

          python3 << 'PYEOF'
          import json, os, datetime

          v   = os.environ['TAG'].lstrip('v')
          tag = os.environ['TAG']
          repo = os.environ['REPO']
          base = f'https://github.com/{repo}/releases/download/{tag}'

          data = {
            'version': v,
            'notes': '',
            'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'platforms': {
              'windows-x86_64': {
                'signature': open(f'sigs/RechnungsFee_{v}_x64_en-US.msi.zip.sig').read().strip(),
                'url': f'{base}/RechnungsFee_{v}_x64_en-US.msi.zip',
              },
              'linux-x86_64': {
                'signature': open(f'sigs/RechnungsFee_{v}_amd64.AppImage.tar.gz.sig').read().strip(),
                'url': f'{base}/RechnungsFee_{v}_amd64.AppImage.tar.gz',
              },
            },
          }

          json.dump(data, open('latest.json', 'w'), indent=2)
          print('latest.json generiert:', json.dumps(data, indent=2))
          PYEOF

          gh release upload "$TAG" latest.json --clobber
