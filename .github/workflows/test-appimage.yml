name: Test-AppImage (manuell)

# Manuell auslösbar: GitHub → Actions → "Test-AppImage (manuell)" → Run workflow
# Ergebnis: gepatchtes AppImage als Artifact (kein Release, kein Tag nötig)
on:
  workflow_dispatch:

jobs:
  build-test-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Linux-Deps installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python-Abhängigkeiten installieren
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Backend-Sidecar bauen
        run: bash scripts/build-sidecar.sh

      - name: Node.js 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Frontend-Abhängigkeiten installieren
        working-directory: src/frontend
        run: npm ci

      - name: Rust-Toolchain einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Tauri CLI installieren
        run: npm install -g @tauri-apps/cli@^2

      # Version temporär auf "test" setzen (kein echtes Tag nötig)
      - name: Test-Version setzen
        run: |
          python -c "
          import json
          f = 'src-tauri/tauri.conf.json'
          d = json.load(open(f))
          d['version'] = '0.0.0-test'
          open(f, 'w').write(json.dumps(d, indent=2))
          "

      - name: Tauri AppImage bauen
        run: npx tauri build --target x86_64-unknown-linux-gnu --bundles appimage
        env:
          # Ohne Signing – Test-Build braucht keine Signatur
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ── usr/lib/ entfernen (System-Bibliotheken statt gebündelter verwenden) ──
      # Problem: linuxdeploy bündelt webkit2gtk + GStreamer aus Ubuntu 22.04.
      # Auf neueren Distros (Fedora, Bazzite) kollidieren diese mit den System-
      # Bibliotheken → "undefined symbol: gst_video_is_dma_drm_caps" → Absturz.
      # Fix: usr/lib/ komplett entfernen → System-webkit2gtk + System-GStreamer.
      - name: AppImage Bibliotheken entbündeln
        run: |
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          APPIMAGE="$BASE/RechnungsFee_0.0.0-test_amd64.AppImage"
          SQUASH="${GITHUB_WORKSPACE}/squashfs-root"

          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          echo "=== usr/lib vor dem Entfernen ==="
          du -sh "$SQUASH/usr/lib/" 2>/dev/null || echo "(leer)"
          ls "$SQUASH/usr/lib/" 2>/dev/null | head -20 || true

          rm -rf "$SQUASH/usr/lib/"
          echo "=== usr/lib/ entfernt – System-Bibliotheken werden verwendet ==="

          wget -qO /tmp/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$SQUASH" "$APPIMAGE"
          echo "AppImage neu gepackt: $(du -sh "$APPIMAGE" | cut -f1)"

          cp "$APPIMAGE" "$BASE/RechnungsFee-test.AppImage"
          rm -rf "$SQUASH"

      - name: AppImage als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: test-appimage
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/RechnungsFee-test.AppImage
          retention-days: 3
